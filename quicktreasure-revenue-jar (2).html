<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickTreasure — Revenue Jar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0814;
    --surface: rgba(30,21,48,0.97);
    --purple: #6b3fa0;
    --purple-dim: rgba(107,63,160,0.4);
    --gold: #e8b923;
    --gold-light: #f5d76e;
    --gold-dim: rgba(232,185,35,0.35);
    --text: rgba(230,215,255,0.92);
    --muted: rgba(200,185,230,0.45);
    --green: #4ade80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow-y:auto; padding:20px 0;
  }
  #bg { position:fixed; inset:0; z-index:0; width:100%; height:100%; }
  .grain {
    position:fixed; inset:0; z-index:1; opacity:0.04; pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .card {
    position:relative; z-index:10; width:480px;
    background:var(--surface);
    border:1px solid var(--purple-dim); border-radius:2px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(232,185,35,0.07),0 40px 80px rgba(0,0,0,0.6),0 0 60px rgba(107,63,160,0.12);
    animation:card-in 1s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes card-in{from{opacity:0;transform:translateY(30px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .top-bar {
    height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent);
    background-size:200% 100%; animation:shimmer 3s linear infinite;
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .card-inner { padding:28px 34px 28px; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .header-left { display:flex; align-items:center; gap:8px; }
  .pulse-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px var(--gold); animation:dp 2s ease-in-out infinite; }
  @keyframes dp{0%,100%{box-shadow:0 0 6px var(--gold);}50%{box-shadow:0 0 14px var(--gold),0 0 28px rgba(232,185,35,0.4);}}
  .title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:4px; color:var(--gold); }
  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .month-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .goal-edit { display:flex; align-items:center; gap:5px; }
  .goal-edit-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(200,185,230,0.3); }
  .goal-edit-val { font-size:11px; letter-spacing:1px; color:var(--gold); cursor:pointer; border-bottom:1px dashed rgba(232,185,35,0.3); padding-bottom:1px; transition:color .2s; }
  .goal-edit-val:hover { color:var(--gold-light); border-color:var(--gold); }
  .goal-edit-input { display:none; width:70px; background:rgba(13,8,20,0.8); border:1px solid var(--gold); color:var(--gold); font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:1px; padding:2px 6px; border-radius:2px; outline:none; }
  .goal-edit-input.show { display:block; }

  /* DIVIDER */
  .divider-wrap { margin-bottom:24px; }
  .divider-wrap canvas { width:100%; height:16px; display:block; }

  /* JAR SECTION */
  .jar-section { display:flex; align-items:center; gap:28px; margin-bottom:24px; }
  .jar-wrap { flex-shrink:0; position:relative; }
  #jar-canvas { display:block; }
  .jar-info { flex:1; display:flex; flex-direction:column; gap:14px; }
  .amount-display { text-align:center; }
  .amount-current { font-family:'Bebas Neue',sans-serif; font-size:58px; line-height:1; letter-spacing:2px; background:linear-gradient(135deg,var(--text) 0%,rgba(232,185,35,0.8) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .amount-goal { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:2px; }

  /* PROGRESS BAR */
  .progress-header { display:flex; justify-content:space-between; margin-bottom:6px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .progress-bg { height:3px; background:rgba(107,63,160,0.2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--purple),var(--gold)); transition:width 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* STATS */
  .stats-row { display:flex; gap:8px; }
  .stat-mini { flex:1; background:rgba(13,8,20,0.5); border:1px solid var(--purple-dim); border-radius:2px; padding:10px 8px; text-align:center; }
  .stat-mini-val { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text); line-height:1; }
  .stat-mini-val.gold { color:var(--gold); }
  .stat-mini-val.green { color:var(--green); }
  .stat-mini-lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-top:3px; }

  /* DIVIDER 2 */
  .divider2-wrap { margin-bottom:20px; }
  .divider2-wrap canvas { width:100%; height:16px; display:block; }

  /* INPUT */
  .input-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .input-row { display:flex; gap:8px; }
  .sale-input { flex:1; background:rgba(13,8,20,0.6); border:1px solid var(--purple-dim); color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; padding:10px 14px; border-radius:2px; outline:none; transition:border .2s; }
  .sale-input:focus { border-color:var(--gold); }
  .sale-input::placeholder { color:rgba(200,185,230,0.2); font-size:18px; }
  .add-btn { background:linear-gradient(135deg,var(--gold),var(--gold-light)); color:#0d0814; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 18px; border:none; border-radius:2px; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .add-btn:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,185,35,0.3); }

  /* REEL */
  .recent-wrap { margin-top:16px; }
  .recent-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
  .clear-btn { background:none; border:none; color:rgba(248,113,113,0.4); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:color .2s; }
  .clear-btn:hover { color:rgba(248,113,113,0.8); }
  .reel-wrap { position:relative; height:130px; overflow:hidden; cursor:grab; user-select:none; perspective:300px; }
  .reel-wrap:active { cursor:grabbing; }
  .reel-wrap::before { content:''; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:38px; z-index:1; pointer-events:none; border-top:1px solid rgba(232,185,35,0.15); border-bottom:1px solid rgba(232,185,35,0.15); }
  .reel-wrap::after { content:''; position:absolute; inset:0; z-index:2; pointer-events:none; background:linear-gradient(180deg, rgba(19,13,31,1) 0%, transparent 30%, transparent 70%, rgba(19,13,31,1) 100%); }
  .reel-3d { position:absolute; width:100%; height:100%; top:0; left:0; transform-style:preserve-3d; }

  /* Slot spin keyframes */
  @keyframes spinOut { from { transform:translateY(0);   opacity:1; } to { transform:translateY(-110px); opacity:0; } }
  @keyframes spinIn  { from { transform:translateY(110px); opacity:0; } to { transform:translateY(0);    opacity:1; } }
  .spin-out { animation: spinOut 0.32s cubic-bezier(0.55,0,1,0.45) forwards; }
  .spin-in  { animation: spinIn  0.38s cubic-bezier(0,0.55,0.45,1)  forwards; }

  .reel-item { position:absolute; width:100%; left:0; height:38px; display:flex; align-items:center; justify-content:center; padding:0 6px; transform-origin:center center; backface-visibility:hidden; }
  .reel-item-left { display:flex; align-items:center; gap:10px; justify-content:center; width:100%; }
  .reel-item-pip { width:4px; height:4px; border-radius:50%; background:var(--gold); box-shadow:0 0 5px var(--gold-dim); flex-shrink:0; }
  .reel-item-pip.old { background:rgba(107,63,160,0.5); box-shadow:none; }
  .reel-item-text { display:flex; flex-direction:column; gap:1px; align-items:center; }
  .reel-item-amount { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text); letter-spacing:2px; line-height:1; }
  .reel-item-time { font-size:10px; color:var(--muted); text-align:center; }
  .reel-item-del { background:none; border:none; color:rgba(200,185,230,0.12); cursor:pointer; font-size:15px; transition:color .2s; padding:4px; position:absolute; right:6px; top:50%; transform:translateY(-50%); z-index:3; }
  .reel-item-del:hover { color:rgba(248,113,113,0.7); }
  .reel-empty { position:absolute; width:100%; top:50%; transform:translateY(-50%); text-align:center; font-size:12px; color:rgba(200,185,230,0.2); font-style:italic; }

  /* GOAL BANNER */
  .goal-banner { display:none; text-align:center; padding:12px; background:rgba(232,185,35,0.08); border:1px solid rgba(232,185,35,0.3); border-radius:2px; margin-bottom:16px; font-size:13px; color:var(--gold); font-weight:600; letter-spacing:1px; }
  .goal-banner.show { display:block; animation:goal-pop .5s cubic-bezier(0.16,1,0.3,1); }
  @keyframes goal-pop{from{transform:scale(0.95);opacity:0;}to{transform:scale(1);opacity:1;}}

  /* LEADERBOARD */
  .lb-wrap { margin-top:20px; padding-top:16px; border-top:1px solid rgba(107,63,160,0.2); }
  .lb-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .lb-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  /* Outer clip: only show the front row at rest. Overflow hidden clips the cylinder. */
  .lb-reel-wrap {
    position:relative; height:38px; overflow:hidden;
    cursor:grab; user-select:none;
    perspective:400px; perspective-origin:50% 50%;
  }
  .lb-reel-wrap:active { cursor:grabbing; }
  /* The 3D stage is taller than the clip — rows stack behind in Z */
  .lb-reel-3d {
    position:absolute; width:100%; left:0;
    top:0; height:38px;
    transform-style:preserve-3d;
  }
  .lb-row {
    position:absolute; width:100%; left:0; height:38px;
    display:flex; align-items:center; gap:10px;
    padding:0 12px; border-radius:2px;
    background:rgba(13,8,20,0.5); border:1px solid rgba(107,63,160,0.25);
    transform-origin:center center; backface-visibility:hidden;
    box-sizing:border-box;
  }
  .lb-row.rank-1 { border-color:rgba(232,185,35,0.45); }
  .lb-row.rank-2 { border-color:rgba(200,200,200,0.22); }
  .lb-row.rank-3 { border-color:rgba(184,115,51,0.3); }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:18px; width:22px; text-align:center; flex-shrink:0; line-height:1; }
  .lb-rank.r1 { color:var(--gold); }
  .lb-rank.r2 { color:rgba(210,210,210,0.7); }
  .lb-rank.r3 { color:rgba(184,115,51,0.9); }
  .lb-rank.rn { color:var(--muted); }
  .lb-month { flex:1; font-size:11px; letter-spacing:1px; color:var(--text); }
  .lb-meta { font-size:9px; color:var(--muted); letter-spacing:0.5px; }
  .lb-amt { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:var(--gold); line-height:1; }
  .lb-del { background:none; border:none; color:rgba(200,185,230,0.1); cursor:pointer; font-size:15px; padding:2px 4px; transition:color .2s; flex-shrink:0; }
  .lb-del:hover { color:rgba(248,113,113,0.7); }
  .lb-empty { position:absolute; width:100%; top:50%; transform:translateY(-50%); text-align:center; font-size:12px; color:rgba(200,185,230,0.18); font-style:italic; }

    .bottom-bar { height:2px; background:linear-gradient(90deg,transparent,rgba(107,63,160,0.4),transparent); }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="grain"></div>

<div class="card">
  <div class="top-bar"></div>
  <div class="card-inner">

    <div class="header">
      <div class="header-left">
        <div class="pulse-dot"></div>
        <div class="title">Revenue Jar</div>
      </div>
      <div class="header-right">
        <div class="month-label" id="month-label"></div>
        <div class="goal-edit">
          <span class="goal-edit-label">Goal:</span>
          <span class="goal-edit-val" id="goal-edit-val" onclick="toggleGoalEdit()">$1,000</span>
          <input class="goal-edit-input" type="number" id="goal-edit-input" placeholder="1000" onblur="saveGoal()" onkeydown="if(event.key==='Enter')saveGoal()">
        </div>
      </div>
    </div>

    <div class="divider-wrap"><canvas id="div1" height="16"></canvas></div>

    <div class="jar-section">
      <div class="jar-wrap" id="jar-wrap">
        <canvas id="jar-canvas" width="140" height="200"></canvas>
      </div>
      <div class="jar-info">
        <div class="amount-display">
          <div class="amount-current" id="amount-current">$0</div>
          <div class="amount-goal">of <span id="goal-label">$1,000</span> goal</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-header"><span>Progress</span><span id="pct-label">0%</span></div>
          <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="stats-row">
          <div class="stat-mini"><div class="stat-mini-val green" id="stat-sales">0</div><div class="stat-mini-lbl">Sales</div></div>
          <div class="stat-mini"><div class="stat-mini-val gold" id="stat-avg">$0</div><div class="stat-mini-lbl">Avg Sale</div></div>
          <div class="stat-mini"><div class="stat-mini-val" id="stat-remaining">$1,000</div><div class="stat-mini-lbl">To Goal</div></div>
        </div>
      </div>
    </div>

    <div class="goal-banner" id="goal-banner">🏆 Goal Reached! You hit <span id="goal-banner-amt">$1,000</span> this month!</div>

    <div class="divider2-wrap"><canvas id="div2" height="16"></canvas></div>

    <div class="input-section">
      <div class="input-label">Add a sale</div>
      <div class="input-row">
        <input class="sale-input" type="number" id="sale-input" placeholder="$0.00" min="0" step="0.01">
        <button class="add-btn" onclick="addSale()">+ Add</button>
      </div>
    </div>

    <div class="recent-wrap">
      <div class="recent-label">
        <span>This Month's Sales</span>
        <button class="clear-btn" onclick="clearAll()">Reset Month</button>
      </div>
      <div class="reel-wrap" id="reel-wrap">
        <div class="reel-3d" id="reel-3d"></div>
      </div>
    </div>

    <div class="lb-wrap">
      <div class="lb-header">
        <span class="lb-title">🏆 Top Months</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span id="lb-nav" style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,185,230,0.25);"></span>
          <button onclick="lbStep(-1)" id="lb-up"   style="background:none;border:1px solid rgba(107,63,160,0.35);color:rgba(200,185,230,0.45);width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s;">▲</button>
          <button onclick="lbStep(1)"  id="lb-down" style="background:none;border:1px solid rgba(107,63,160,0.35);color:rgba(200,185,230,0.45);width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s;">▼</button>
        </div>
      </div>
      <div class="lb-reel-wrap" id="lb-reel-wrap">
        <div class="lb-reel-3d" id="lb-reel-3d"></div>
      </div>
    </div>

  <!-- CONFIRM MODAL -->
  <div id="confirm-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
    <div style="background:rgba(30,21,48,0.98);border:1px solid rgba(232,185,35,0.4);border-radius:4px;padding:28px 32px;max-width:320px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.8);">
      <div id="confirm-title" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#e8b923;margin-bottom:8px;"></div>
      <div id="confirm-sub" style="font-size:12px;color:rgba(200,185,230,0.6);margin-bottom:24px;line-height:1.5;"></div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button id="confirm-no"  style="background:none;border:1px solid rgba(107,63,160,0.5);color:rgba(200,185,230,0.6);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;border-radius:2px;cursor:pointer;">Cancel</button>
        <button id="confirm-yes" style="background:linear-gradient(135deg,#e8b923,#f5d76e);color:#0d0814;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;border-radius:2px;cursor:pointer;border:none;">Reset</button>
      </div>
    </div>
  </div>

  </div>
  <div class="bottom-bar"></div>
</div>

<script>
  let GOAL = parseFloat(localStorage.getItem('qt_jar_goal')) || 1000;

  // ── BG ──
  const bgC = document.getElementById('bg'), bgX = bgC.getContext('2d');
  let BW, BH, bt = 0;
  function resizeBg() { BW = bgC.width = window.innerWidth; BH = bgC.height = window.innerHeight; }
  resizeBg(); window.addEventListener('resize', resizeBg);
  const orbs = [{x:.15,y:.2,r:280,c:[107,63,160],s:.00018,p:0},{x:.8,y:.75,r:220,c:[232,185,35],s:.00012,p:2},{x:.6,y:.3,r:180,c:[140,50,200],s:.00022,p:4}];
  function drawBg() {
    bt++; bgX.fillStyle = '#0d0814'; bgX.fillRect(0,0,BW,BH);
    bgX.strokeStyle = 'rgba(107,63,160,0.06)'; bgX.lineWidth = 1;
    for (let x=0;x<BW;x+=40){bgX.globalAlpha=Math.max(0,1-Math.abs(x-BW/2)/(BW*.6));bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,BH);bgX.stroke();}
    for (let y=0;y<BH;y+=40){bgX.globalAlpha=Math.max(0,1-Math.abs(y-BH/2)/(BH*.6));bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(BW,y);bgX.stroke();}
    bgX.globalAlpha = 1;
    orbs.forEach(o => {
      const cx=o.x*BW+Math.sin(bt*o.s+o.p)*80, cy=o.y*BH+Math.cos(bt*o.s*.7+o.p)*60;
      const g=bgX.createRadialGradient(cx,cy,0,cx,cy,o.r);
      g.addColorStop(0,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},.3)`); g.addColorStop(1,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},0)`);
      bgX.filter='blur(40px)'; bgX.fillStyle=g; bgX.beginPath(); bgX.arc(cx,cy,o.r,0,Math.PI*2); bgX.fill(); bgX.filter='none';
    });
    requestAnimationFrame(drawBg);
  }
  drawBg();

  // ── DIVIDERS ──
  function setupDivider(id, delay) {
    const dc = document.getElementById(id), dctx = dc.getContext('2d');
    let dp = -delay;
    function resizeDiv(){ dc.width = dc.parentElement.clientWidth; dc.height = 16; }
    resizeDiv(); window.addEventListener('resize', resizeDiv);
    function drawDiv(f) {
      const W=dc.width, H=dc.height, cy=H/2;
      dctx.clearRect(0,0,W,H);
      const sX=[W/2-55,W/2,W/2+55];
      const prog=((f%300)+300)%300/300, cX=-0.15*W+prog*W*1.3, tL=W*.22;
      function br(x){const d=cX-x;return(d<0||d>tL)?0:Math.pow(1-d/tL,1.5);}
      [[0,sX[0]-12],[sX[0]+12,sX[1]-12],[sX[1]+12,sX[2]-12],[sX[2]+12,W]].forEach(([x1,x2])=>{
        if(x2<=x1)return;
        const bg=dctx.createLinearGradient(x1,cy,x2,cy);
        bg.addColorStop(0,'rgba(107,63,160,0)'); bg.addColorStop(.3,'rgba(107,63,160,.5)'); bg.addColorStop(.7,'rgba(232,185,35,.25)'); bg.addColorStop(1,'rgba(107,63,160,0)');
        dctx.strokeStyle=bg; dctx.lineWidth=1; dctx.beginPath(); dctx.moveTo(x1,cy); dctx.lineTo(x2,cy); dctx.stroke();
        for(let i=0;i<x2-x1;i+=2){const x=x1+i,b=br(x);if(b<=0)continue;dctx.strokeStyle=`rgba(255,230,100,${b*.95})`;dctx.lineWidth=1+b*1.5;dctx.shadowColor=`rgba(232,185,35,${b*.8})`;dctx.shadowBlur=b*8;dctx.beginPath();dctx.moveTo(x,cy);dctx.lineTo(x+2,cy);dctx.stroke();dctx.shadowBlur=0;}
      });
      ['✦','✦','✦'].forEach((s,i)=>{
        const sx=sX[i],b=br(sx);dctx.font=`${8+b*3}px serif`;dctx.textAlign='center';dctx.textBaseline='middle';
        dctx.fillStyle=`rgba(232,185,35,${.3+b*.7})`;if(b>.1){dctx.shadowColor=`rgba(255,220,80,${b})`;dctx.shadowBlur=b*12;}
        dctx.fillText(s,sx,cy);dctx.shadowBlur=0;
      });
      dp++; requestAnimationFrame(()=>drawDiv(dp));
    }
    drawDiv(dp);
  }
  setupDivider('div1', 0);
  setupDivider('div2', 150);

  // ── JAR ──
  const jar = document.getElementById('jar-canvas');
  const jctx = jar.getContext('2d');
  let fillTarget = 0, fillCurrent = 0, waveOffset = 0;
  let coins = [];
  // DRIPS: module-level array, no re-declaration elsewhere
  let drips = [];

  function drawJar(pct) {
    const W = jar.width, H = jar.height;
    jctx.clearRect(0, 0, W, H);

    const jx=20, jy=20, jw=W-40, jh=H-40;
    const neckH=22, neckW=jw*0.55;
    const bodyTop=jy+neckH, bodyH=jh-neckH;
    const neckX=jx+(jw-neckW)/2;

    function jarPath() {
      jctx.beginPath();
      jctx.moveTo(neckX, bodyTop);
      jctx.lineTo(neckX+neckW, bodyTop);
      jctx.bezierCurveTo(neckX+neckW+18, bodyTop+bodyH*0.1, jx+jw, bodyTop+bodyH*0.2, jx+jw, bodyTop+bodyH*0.5);
      jctx.bezierCurveTo(jx+jw, bodyTop+bodyH*0.8, jx+jw-8, bodyTop+bodyH-10, jx+jw/2, bodyTop+bodyH);
      jctx.bezierCurveTo(jx+8, bodyTop+bodyH-10, jx, bodyTop+bodyH*0.8, jx, bodyTop+bodyH*0.5);
      jctx.bezierCurveTo(jx, bodyTop+bodyH*0.2, neckX-18, bodyTop+bodyH*0.1, neckX, bodyTop);
      jctx.closePath();
    }

    // Clipped fill
    jctx.save();
    jarPath();
    jctx.clip();

    const fillH = bodyH * Math.min(pct, 1);
    const fillY = bodyTop + bodyH - fillH;

    if (pct > 0) {
      const fg = jctx.createLinearGradient(0, fillY, 0, bodyTop+bodyH);
      if (pct >= 1) {
        fg.addColorStop(0,'rgba(232,185,35,0.9)'); fg.addColorStop(1,'rgba(180,120,10,0.95)');
      } else {
        fg.addColorStop(0,'rgba(107,63,160,0.7)'); fg.addColorStop(0.4,'rgba(150,80,200,0.8)'); fg.addColorStop(1,'rgba(232,185,35,0.6)');
      }
      jctx.fillStyle = fg;
      jctx.fillRect(jx-5, fillY+6, jw+10, bodyH);

      // Wave
      jctx.beginPath();
      jctx.moveTo(jx-5, fillY+6);
      const ww = jw+10;
      for (let wx=0;wx<=ww;wx+=2) {
        jctx.lineTo(jx-5+wx, fillY+6+Math.sin((wx/ww)*Math.PI*3+waveOffset)*3);
      }
      jctx.lineTo(jx+jw+5, bodyTop+bodyH);
      jctx.lineTo(jx-5, bodyTop+bodyH);
      jctx.closePath();
      jctx.fillStyle = fg;
      jctx.fill();

      // Wave highlight stroke
      jctx.beginPath();
      jctx.moveTo(jx-5, fillY+6);
      for (let wx=0;wx<=ww;wx+=2) {
        jctx.lineTo(jx-5+wx, fillY+6+Math.sin((wx/ww)*Math.PI*3+waveOffset)*3);
      }
      jctx.strokeStyle = pct>=1 ? 'rgba(255,240,150,0.6)' : 'rgba(200,150,255,0.4)';
      jctx.lineWidth = 1.5;
      jctx.stroke();

      // Coins
      coins.forEach(c => {
        if (c.y > fillY+4) {
          jctx.font = `${c.size}px serif`; jctx.textAlign='center'; jctx.textBaseline='middle';
          jctx.globalAlpha = c.alpha; jctx.fillText('💰', c.x, c.y); jctx.globalAlpha=1;
        }
      });
    }
    jctx.restore();

    // Outline
    jctx.save();
    jarPath();
    jctx.strokeStyle = pct>=1 ? 'rgba(232,185,35,0.8)' : 'rgba(107,63,160,0.7)';
    jctx.lineWidth = 1.5;
    jctx.stroke();

    // Glass shine
    jctx.beginPath();
    jctx.moveTo(neckX+8, bodyTop+10);
    jctx.bezierCurveTo(neckX+4, bodyTop+bodyH*0.25, jx+8, bodyTop+bodyH*0.35, jx+10, bodyTop+bodyH*0.5);
    jctx.strokeStyle='rgba(255,255,255,0.12)'; jctx.lineWidth=3; jctx.lineCap='round'; jctx.stroke();

    // Lid
    jctx.fillStyle = pct>=1 ? 'rgba(232,185,35,0.5)' : 'rgba(107,63,160,0.5)';
    jctx.beginPath(); jctx.roundRect(neckX-4, jy+10, neckW+8, 10, 3); jctx.fill();
    jctx.strokeStyle = pct>=1 ? 'rgba(232,185,35,0.8)' : 'rgba(107,63,160,0.8)'; jctx.lineWidth=1; jctx.stroke();

    // Knob
    jctx.fillStyle = pct>=1 ? 'rgba(232,185,35,0.6)' : 'rgba(107,63,160,0.6)';
    jctx.beginPath(); jctx.roundRect(neckX+neckW/2-8, jy+2, 16, 8, 2); jctx.fill();
    jctx.strokeStyle = pct>=1 ? 'rgba(232,185,35,0.9)' : 'rgba(180,130,255,0.6)'; jctx.lineWidth=1; jctx.stroke();

    if (pct>=1) {
      jctx.shadowColor='rgba(232,185,35,0.5)'; jctx.shadowBlur=20;
      jctx.beginPath(); jctx.arc(W/2,H/2+10,50,0,Math.PI*2); jctx.fillStyle='rgba(232,185,35,0.03)'; jctx.fill();
      jctx.shadowBlur=0;
    }

    // Drip particles drawn on canvas (outside clip)
    drips.forEach(d => {
      if (d.alpha <= 0) return;
      jctx.beginPath();
      jctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      jctx.fillStyle = `rgba(130,60,210,${d.alpha})`;
      jctx.shadowColor = `rgba(180,100,255,${d.alpha*0.5})`;
      jctx.shadowBlur = 4;
      jctx.fill();
      jctx.shadowBlur = 0;
    });

    jctx.restore();
  }

  function animateJar() {
    waveOffset += 0.04;
    fillCurrent += (fillTarget - fillCurrent) * 0.05;
    coins.forEach(c => { c.y -= c.speed; c.alpha -= 0.004; });
    coins = coins.filter(c => c.alpha > 0);
    drips.forEach(d => { d.vy += 0.28; d.y += d.vy; d.alpha -= 0.02; });
    drips = drips.filter(d => d.alpha > 0);
    drawJar(fillCurrent / GOAL);
    requestAnimationFrame(animateJar);
  }
  animateJar();

  function spawnCoins(count) {
    for (let i=0;i<count;i++) {
      coins.push({ x:30+Math.random()*80, y:170+Math.random()*20, speed:0.3+Math.random()*0.5, alpha:0.6+Math.random()*0.4, size:10+Math.random()*8 });
    }
    if (coins.length > 20) coins = coins.slice(-20);
  }

  function spawnDrips() {
    let count = 0;
    const iv = setInterval(() => {
      // Pour from left neck of the jar when tilted
      drips.push({
        x: 16 + Math.random() * 10,
        y: 38 + Math.random() * 16,
        vy: 0.6 + Math.random() * 1.2,
        r: 2 + Math.random() * 3,
        alpha: 0.8 + Math.random() * 0.2
      });
      count++;
      if (count >= 24) clearInterval(iv);
    }, 65);
  }

  // ── MONTHS ──
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-label').textContent = months[new Date().getMonth()] + ' ' + new Date().getFullYear();

  // ── DATA ──
  const storageKey = () => `qt_jar_${new Date().getFullYear()}_${new Date().getMonth()}`;
  function loadData() { try { return JSON.parse(localStorage.getItem(storageKey())) || []; } catch { return []; } }
  function saveData(arr) { localStorage.setItem(storageKey(), JSON.stringify(arr)); }

  // ── MONTHLY RECORDS ──
  function getRecords() { try { return JSON.parse(localStorage.getItem('qt_jar_monthly_records')) || []; } catch { return []; } }
  function saveRecord(key, total, salesCount) {
    let recs = getRecords().filter(r => r.key !== key);
    recs.push({ key, total, salesCount });
    recs.sort((a,b) => b.total - a.total);
    localStorage.setItem('qt_jar_monthly_records', JSON.stringify(recs.slice(0,20)));
  }
  function monthLabel(key) {
    const p = key.replace('qt_jar_','').split('_');
    return months[parseInt(p[1])] + ' ' + p[0];
  }
  // ── LEADERBOARD REEL ──
  let lbOffset = 0, lbDragging = false, lbAnimFrame = null;
  const LB_ITEM_H = 38;
  const LB_CYLINDER_R = 70;

  function renderTop3() {
    buildLbReel();
  }

  function buildLbReel() {
    const reel = document.getElementById('lb-reel-3d');
    if (!reel) return;
    reel.innerHTML = '';
    const recs = getRecords();

    if (!recs.length) {
      reel.innerHTML = '<div class="lb-empty">Reset a month to record it here</div>';
      return;
    }

    const rankCls = ['rank-1','rank-2','rank-3'];
    const rankNum = ['r1','r2','r3'];
    const medals  = ['🥇','🥈','🥉'];

    recs.slice(0,10).forEach((r, i) => {
      const el = document.createElement('div');
      el.className = 'lb-row ' + (rankCls[i] || '');
      const medal = i < 3 ? medals[i] : (i+1)+'';
      const amt = '$' + r.total.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
      el.innerHTML = `
        <div class="lb-rank ${rankNum[i]||'rn'}">${medal}</div>
        <div class="lb-month">${monthLabel(r.key)}</div>
        <div class="lb-meta">${r.salesCount} sale${r.salesCount!==1?'s':''}</div>
        <div style="flex:1"></div>
        <div class="lb-amt">${amt}</div>
        <button class="lb-del" onclick="deleteRecord(${i});event.stopPropagation()">×</button>`;
      reel.appendChild(el);
    });

    lbOffset = Math.max(0, Math.min(lbOffset, recs.length - 1));
    positionLbReel();
  }

  function positionLbReel() {
    const reel = document.getElementById('lb-reel-3d');
    if (!reel) return;
    const items = reel.querySelectorAll('.lb-row');
    if (!items.length) return;
    const n = items.length;
    lbOffset = Math.max(0, Math.min(lbOffset, n - 1));

    // Large radius → front item is nearly flat, others stack behind in Z
    const R = 160;        // cylinder radius (px) — bigger = flatter front row
    const DEG = 22;       // degrees between each step
    const H = LB_ITEM_H; // 38px

    items.forEach((el, i) => {
      const diff = i - lbOffset;
      const angle = diff * DEG;
      const rad = angle * Math.PI / 180;
      // Y: keep front item centred at top=0 (fills the 38px container exactly)
      const yPos = Math.sin(rad) * R;
      // Z: items behind have negative Z (recede into screen)
      const zPos = (Math.cos(rad) - 1) * R;
      const absDiff = Math.abs(diff);

      el.style.top = `${yPos}px`;
      el.style.transform = `translateZ(${zPos}px) rotateX(${-angle}deg)`;
      // At rest: only front item (diff=0) is visible (opacity 1)
      // During scroll: adjacent items fade in briefly
      el.style.opacity = Math.max(0, 1 - absDiff * 1.2);
      el.style.display = absDiff > 3 ? 'none' : 'flex';
    });

    // Update nav hint
    const nav = document.getElementById('lb-nav');
    if (nav) {
      const rec = getRecords();
      nav.textContent = rec.length > 1 ? `${Math.round(lbOffset)+1} / ${rec.length}  scroll ↕` : '';
    }
  }

  function lbStep(dir) {
    const recs = getRecords();
    lbOffset = Math.max(0, Math.min(lbOffset + dir, (recs.length||1)-1));
    snapLb();
  }

  function snapLb() {
    const recs = getRecords();
    const target = Math.round(Math.max(0, Math.min(lbOffset, (recs.length||1)-1)));
    cancelAnimationFrame(lbAnimFrame);
    const go = () => {
      lbOffset += (target - lbOffset) * 0.2;
      positionLbReel();
      if (Math.abs(target - lbOffset) > 0.01) lbAnimFrame = requestAnimationFrame(go);
      else { lbOffset = target; positionLbReel(); }
    };
    lbAnimFrame = requestAnimationFrame(go);
  }

  function deleteRecord(idx) {
    let recs = getRecords();
    recs.splice(idx, 1);
    if (lbOffset >= recs.length) lbOffset = Math.max(0, recs.length - 1);
    localStorage.setItem('qt_jar_monthly_records', JSON.stringify(recs));
    renderTop3();
  }

  (function initLbReel() {
    setTimeout(() => {
      const wrap = document.getElementById('lb-reel-wrap');
      if (!wrap) return;
      let lastY = 0, accDelta = 0, dragAccY = 0;

      wrap.addEventListener('wheel', e => {
        e.preventDefault();
        accDelta += e.deltaY;
        if (Math.abs(accDelta) >= 30) {
          const recs = getRecords();
          lbOffset = Math.max(0, Math.min(lbOffset + (accDelta > 0 ? 1 : -1), (recs.length||1)-1));
          accDelta = 0;
          snapLb();
        }
      }, {passive:false});

      const onStart = y => { lbDragging=true; lastY=y; dragAccY=0; cancelAnimationFrame(lbAnimFrame); };
      const onMove = y => {
        if (!lbDragging) return;
        dragAccY += lastY - y; lastY = y;
        const recs = getRecords();
        while (dragAccY >= LB_ITEM_H) { lbOffset=Math.min(lbOffset+1,(recs.length||1)-1); dragAccY-=LB_ITEM_H; positionLbReel(); }
        while (dragAccY <= -LB_ITEM_H) { lbOffset=Math.max(lbOffset-1,0); dragAccY+=LB_ITEM_H; positionLbReel(); }
      };
      const onEnd = () => { if(!lbDragging)return; lbDragging=false; dragAccY=0; snapLb(); };

      wrap.addEventListener('mousedown', e=>{e.preventDefault();onStart(e.clientY);});
      window.addEventListener('mousemove', e=>onMove(e.clientY));
      window.addEventListener('mouseup', ()=>onEnd());
      wrap.addEventListener('touchstart', e=>onStart(e.touches[0].clientY),{passive:true});
      wrap.addEventListener('touchmove', e=>{e.preventDefault();onMove(e.touches[0].clientY);},{passive:false});
      wrap.addEventListener('touchend', ()=>onEnd());
    }, 0);
  })();


  // ── GOAL EDIT ──
  function toggleGoalEdit() {
    document.getElementById('goal-edit-val').style.display = 'none';
    const inp = document.getElementById('goal-edit-input');
    inp.value = GOAL; inp.classList.add('show'); inp.focus(); inp.select();
  }
  function saveGoal() {
    const inp = document.getElementById('goal-edit-input');
    const v = parseFloat(inp.value);
    if (v && v > 0) { GOAL = v; localStorage.setItem('qt_jar_goal', GOAL); }
    inp.classList.remove('show');
    document.getElementById('goal-edit-val').style.display = '';
    renderAll();
  }
  function formatGoal(g) { return '$'+g.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

  // ── REEL STATE ──
  let reelOffset = 0, reelDragging = false, reelAnimFrame = null;
  const ITEM_H=38, CYLINDER_R=90, MAX_VISIBLE=5;

  let sales = loadData();
  renderAll();
  renderTop3();

  // ── SALES ──
  function addSale() {
    const inp = document.getElementById('sale-input');
    const val = parseFloat(inp.value);
    if (!val || val<=0) { inp.focus(); return; }
    sales.push({ amount:val, time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) });
    saveData(sales); spawnCoins(3); inp.value=''; inp.focus(); reelOffset=0; renderAll(true);
  }
  document.getElementById('sale-input').addEventListener('keydown', e => { if(e.key==='Enter') addSale(); });

  function deleteSale(idx) { sales.splice(idx,1); saveData(sales); renderAll(); }

  // ── CONFIRM MODAL ──
  function showConfirm(title, sub, onYes) {
    const ov = document.getElementById('confirm-overlay');
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-sub').textContent = sub;
    ov.style.display = 'flex';
    document.getElementById('confirm-yes').onclick = () => { ov.style.display='none'; onYes(); };
    document.getElementById('confirm-no').onclick  = () => { ov.style.display='none'; };
  }

  // ── CLEAR / RESET MONTH ──
  function clearAll() {
    showConfirm("Reset this month?", "Your total will be saved to Top 3, then everything clears.", doReset);
  }

  function doReset() {
    // Save record
    const total = sales.reduce((s,x) => s+x.amount, 0);
    if (sales.length > 0 && total > 0) saveRecord(storageKey(), total, sales.length);

    // === JAR TILT ANIMATION ===
    const jarWrap = document.getElementById('jar-wrap');
    // Step 1: tilt the jar
    jarWrap.style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1)';
    jarWrap.style.transformOrigin = '50% 95%';
    // Force reflow so transition fires
    jarWrap.getBoundingClientRect();
    jarWrap.style.transform = 'rotate(-28deg) translateY(-10px)';

    // Step 2: spawn drip particles
    spawnDrips();

    // Step 3: drain the fill level
    const startFill = fillCurrent;
    let step = 0;
    const drainIv = setInterval(() => {
      step++;
      fillTarget = Math.max(0, startFill * (1 - step/38));
      if (step >= 38) { fillTarget = 0; clearInterval(drainIv); }
    }, 50);

    // === REEL SLOT SPIN OUT ===
    const reel = document.getElementById('reel-3d');
    reel.classList.add('spin-out');

    // After spin-out completes: reset data, spin in empty
    setTimeout(() => {
      // Reset everything
      sales = [];
      saveData(sales);
      coins = [];
      fillCurrent = 0;
      fillTarget = 0;
      reelOffset = 0;
      cancelAnimationFrame(reelAnimFrame);

      // Rebuild reel to empty state (no animation class so it's instant/invisible)
      buildReel();

      // Now spin in
      reel.classList.remove('spin-out');
      void reel.offsetWidth; // force reflow
      reel.classList.add('spin-in');
      setTimeout(() => reel.classList.remove('spin-in'), 420);

      // Update UI numbers
      renderAll();
      renderTop3();
    }, 340);

    // Snap jar back upright
    setTimeout(() => {
      jarWrap.style.transform = 'rotate(0deg) translateY(0px)';
    }, 1100);
    setTimeout(() => {
      jarWrap.style.transition = '';
      jarWrap.style.transformOrigin = '';
      jarWrap.style.transform = '';
    }, 1650);
  }

  // ── RENDER ──
  function renderAll() {
    const total = sales.reduce((s,x) => s+x.amount, 0);
    const pct = Math.min(total/GOAL, 1);
    const remaining = Math.max(GOAL-total, 0);
    const avg = sales.length ? total/sales.length : 0;
    const gf = formatGoal(GOAL);
    document.getElementById('goal-label').textContent = gf;
    document.getElementById('goal-edit-val').textContent = gf;
    document.getElementById('goal-banner-amt').textContent = gf;
    document.getElementById('stat-remaining').textContent = '$'+remaining.toLocaleString();
    fillTarget = total;
    document.getElementById('amount-current').textContent = '$'+total.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
    document.getElementById('pct-label').textContent = Math.round(pct*100)+'%';
    document.getElementById('progress-fill').style.width = (pct*100)+'%';
    document.getElementById('stat-sales').textContent = sales.length;
    document.getElementById('stat-avg').textContent = '$'+avg.toFixed(0);
    const banner = document.getElementById('goal-banner');
    total >= GOAL ? banner.classList.add('show') : banner.classList.remove('show');
    buildReel();
  }

  function buildReel() {
    const reel = document.getElementById('reel-3d');
    if (!reel) return;
    reel.innerHTML = '';
    if (!sales.length) {
      reel.innerHTML = '<div class="reel-empty">No sales yet — add your first one!</div>';
      return;
    }
    [...sales].reverse().forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'reel-item';
      el.innerHTML = `
        <div class="reel-item-left">
          <div class="reel-item-pip ${i===0?'':'old'}"></div>
          <div class="reel-item-text">
            <div class="reel-item-amount">$${s.amount.toFixed(2)}</div>
            <div class="reel-item-time">${s.date} · ${s.time}</div>
          </div>
        </div>
        <button class="reel-item-del" onclick="deleteSale(${sales.length-1-i});event.stopPropagation()">×</button>`;
      reel.appendChild(el);
    });
    positionReel();
  }

  function positionReel() {
    const reel = document.getElementById('reel-3d');
    if (!reel) return;
    const items = reel.querySelectorAll('.reel-item');
    if (!items.length) return;
    reelOffset = Math.max(0, Math.min(reelOffset, items.length-1));
    const centerY = 65;
    items.forEach((el, i) => {
      const diff = i - reelOffset;
      const angle = diff * 24;
      const rad = angle * Math.PI/180;
      const yPos = centerY + Math.sin(rad)*CYLINDER_R - ITEM_H/2;
      const zPos = Math.cos(rad)*CYLINDER_R - CYLINDER_R;
      const absDiff = Math.abs(diff);
      el.style.top = `${yPos}px`;
      el.style.transform = `translateZ(${zPos}px) rotateX(${-angle}deg) scale(${Math.max(0.65,1-absDiff*0.1)})`;
      el.style.opacity = Math.max(0, 1-absDiff*0.38);
      el.style.display = absDiff > MAX_VISIBLE ? 'none' : 'flex';
    });
  }

  function snapReel() {
    const target = Math.round(Math.max(0, Math.min(reelOffset, (sales.length||1)-1)));
    cancelAnimationFrame(reelAnimFrame);
    const go = () => {
      reelOffset += (target-reelOffset)*0.2;
      positionReel();
      if (Math.abs(target-reelOffset) > 0.01) reelAnimFrame = requestAnimationFrame(go);
      else { reelOffset=target; positionReel(); }
    };
    reelAnimFrame = requestAnimationFrame(go);
  }

  // ── REEL INTERACTION ──
  (function initReel() {
    const wrap = document.getElementById('reel-wrap');
    let lastY=0, accDelta=0, dragAccY=0;
    wrap.addEventListener('wheel', e => {
      e.preventDefault(); accDelta+=e.deltaY;
      if (Math.abs(accDelta)>=40) { reelOffset+=accDelta>0?1:-1; accDelta=0; snapReel(); }
    }, {passive:false});
    const onStart=y=>{ reelDragging=true; lastY=y; dragAccY=0; cancelAnimationFrame(reelAnimFrame); };
    const onMove=y=>{ if(!reelDragging)return; dragAccY+=lastY-y; lastY=y;
      while(dragAccY>=ITEM_H){reelOffset=Math.min(reelOffset+1,(sales.length||1)-1);dragAccY-=ITEM_H;positionReel();}
      while(dragAccY<=-ITEM_H){reelOffset=Math.max(reelOffset-1,0);dragAccY+=ITEM_H;positionReel();}
    };
    const onEnd=()=>{ if(!reelDragging)return; reelDragging=false; dragAccY=0; snapReel(); };
    wrap.addEventListener('mousedown', e=>{e.preventDefault();onStart(e.clientY);});
    window.addEventListener('mousemove', e=>onMove(e.clientY));
    window.addEventListener('mouseup', ()=>onEnd());
    wrap.addEventListener('touchstart', e=>onStart(e.touches[0].clientY),{passive:true});
    wrap.addEventListener('touchmove', e=>{e.preventDefault();onMove(e.touches[0].clientY);},{passive:false});
    wrap.addEventListener('touchend', ()=>onEnd());
  })();
</script>
</body>
</html>
